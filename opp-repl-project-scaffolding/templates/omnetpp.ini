# Template: minimal omnetpp.ini for a new project.
# Replace `Network` with your actual network name.
# Replace `mm1k` with your project/package name if used.

[General]
network = Network
sim-time-limit = 100s
cmdenv-express-mode = true
cmdenv-output-file = ${resultdir}/${configname}-#${repetition}.out

# Example: a named config that inherits from [General]
[Config Default]
description = "Default run"
repeat = 10
seed-set = ${repetition}
